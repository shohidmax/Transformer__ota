<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8">
  <title>Smart Security Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    .pulse-danger { animation: pulseWarning 1.5s infinite; }
    @keyframes pulseWarning { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
  </style>
</head>
<body class="bg-base-300 min-h-screen text-base-content antialiased">
  
  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-xl border-b border-white/5 sticky top-0 z-50">
    <div class="flex-1">
      <a class="btn btn-ghost text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-primary">
        🛡️ Transformer Guard
      </a>
    </div>
    <div class="flex-none gap-2">
      <div id="onlineBadge" class="badge badge-error badge-lg gap-2 shadow-lg drop-shadow-md font-bold">
        <span class="w-2 h-2 rounded-full bg-current"></span> OFFLINE
      </div>
    </div>
  </div>

  <div class="max-w-5xl mx-auto p-4 md:p-6 space-y-6">
    
    <!-- MASTER STATUS CARD -->
    <div id="statusCard" class="card bg-base-100 shadow-2xl border border-white/10 transition-all duration-300">
      <div class="card-body items-center text-center py-10">
        <h2 id="sysStatusText" class="text-4xl md:text-5xl font-black text-success tracking-wider uppercase transition-colors">
          ✅ SYSTEM SAFE
        </h2>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      
      <!-- SENSOR CARDS -->
      <div class="card bg-base-100 shadow-xl border border-white/5">
        <div class="card-body">
          <h2 class="card-title text-xl text-primary"><span class="text-2xl">🏃‍♂️</span> Radars</h2>
          <div class="divider mt-0 mb-2"></div>
          <div class="flex flex-col gap-4">
            <div class="flex justify-between items-center p-3 bg-base-200 rounded-xl">
              <span class="font-semibold font-mono text-lg">Radar 1 <span class="text-xs text-base-content/50">(Left)</span></span>
              <span id="rdr1" class="badge badge-success badge-lg font-bold">CLEAR</span>
            </div>
            <div class="flex justify-between items-center p-3 bg-base-200 rounded-xl">
              <span class="font-semibold font-mono text-lg">Radar 2 <span class="text-xs text-base-content/50">(Right)</span></span>
              <span id="rdr2" class="badge badge-success badge-lg font-bold">CLEAR</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ENVIRONMENT CARD -->
      <div class="card bg-base-100 shadow-xl border border-white/5">
        <div class="card-body">
          <h2 class="card-title text-xl text-info"><span class="text-2xl">🌡️</span> Environment</h2>
          <div class="divider mt-0 mb-2"></div>
          <div class="flex justify-around items-center h-full">
            <div class="text-center">
              <div class="text-4xl font-black text-info drop-shadow-md"><span id="temp">--</span>°C</div>
              <div class="text-xs tracking-widest uppercase mt-2 opacity-50 font-bold">Temp</div>
            </div>
            <div class="divider divider-horizontal"></div>
            <div class="text-center">
              <div class="text-4xl font-black text-info drop-shadow-md"><span id="hum">--</span>%</div>
              <div class="text-xs tracking-widest uppercase mt-2 opacity-50 font-bold">Humidity</div>
            </div>
          </div>
        </div>
      </div>

      <!-- NETWORK CARD -->
      <div class="card bg-base-100 shadow-xl border border-white/5">
        <div class="card-body">
          <h2 class="card-title text-xl text-secondary"><span class="text-2xl">📶</span> Network Statistics</h2>
          <div class="divider mt-0 mb-2"></div>
          <div class="grid grid-cols-1 gap-2">
            <div class="flex justify-between items-end bg-base-200 p-3 rounded-xl border border-base-300">
              <span class="text-sm font-bold uppercase text-base-content/60">WiFi Name</span>
              <span id="wifiSSID" class="text-xl font-mono text-secondary">--</span>
            </div>
            <div class="flex justify-between items-end bg-base-200 p-3 rounded-xl border border-base-300">
              <span class="text-sm font-bold uppercase text-base-content/60">Signal (RSSI)</span>
              <span class="text-xl font-mono text-secondary"><span id="wifiRSSI">--</span> <span class="text-sm">dBm</span></span>
            </div>
            <div class="flex justify-between items-end bg-base-200 p-3 rounded-xl border border-base-300">
              <span class="text-sm font-bold uppercase text-base-content/60">Local IP</span>
              <span id="wifiIP" class="text-xl font-mono text-secondary">--</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ADMIN CONTROLS CARD -->
      <div class="card bg-base-100 shadow-xl border border-white/5">
        <div class="card-body">
          <h2 class="card-title text-xl text-warning"><span class="text-2xl">⚙️</span> System Admin</h2>
          <div class="divider mt-0 mb-2"></div>
          
          <div class="space-y-4">
            <div class="bg-base-200 p-4 rounded-xl border border-base-300 flex justify-between items-center">
              <div>
                <p class="text-xs font-bold uppercase text-base-content/50 mb-1">Alert API Receivers</p>
                <div class="font-mono text-sm" id="num1_display">Loading...</div>
                <div class="font-mono text-sm" id="num2_display">Loading...</div>
              </div>
              <button onclick="document.getElementById('settings_modal').showModal()" class="btn btn-outline btn-warning btn-sm">Edit Numbers</button>
            </div>
            
            <button onclick="rebootESP()" class="btn btn-error w-full shadow-lg hover:shadow-error/50 font-bold uppercase tracking-wider text-xl h-auto py-3">
              ⏻ Reboot ESP32 Device
            </button>
          </div>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Settings Modal (Phone Numbers) -->
  <dialog id="settings_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box bg-base-200">
      <h3 class="font-bold text-2xl text-warning mb-4">Edit API Mobile Numbers</h3>
      <div class="space-y-4 relative">
        <label class="form-control w-full">
          <div class="label"><span class="label-text font-bold">Primary Contact</span></div>
          <input type="text" id="num1_input" placeholder="+8801..." class="input input-bordered input-warning w-full font-mono text-lg" />
        </label>
        <label class="form-control w-full">
          <div class="label"><span class="label-text font-bold">Secondary Contact</span></div>
          <input type="text" id="num2_input" placeholder="+8801..." class="input input-bordered input-warning w-full font-mono text-lg" />
        </label>
      </div>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn btn-ghost">Cancel</button>
          <button class="btn btn-warning" onclick="saveNumbers()">Save Changes</button>
        </form>
      </div>
    </div>
  </dialog>

  <script>
    // Connection Setup
    const socket = io("https://transformer.maxapi.esp32.site/");

    socket.on('connect', () => console.log('Connected to Node.js server'));
    socket.on('disconnect', () => {
      document.getElementById("onlineBadge").className = "badge badge-error badge-lg gap-2 font-bold shadow-lg";
      document.getElementById("onlineBadge").innerHTML = `<span class="w-2 h-2 rounded-full bg-current"></span> SERVER OFFLINE`;
      document.getElementById("sysStatusText").innerText = "❌ SERVER DISCONNECTED";
    });

    // Handle incoming sensor telemetry
    socket.on('sensorUpdate', (data) => {
      // Offline trigger
      if (data.isOnline === false) {
        document.getElementById("onlineBadge").className = "badge badge-error badge-lg gap-2 font-bold shadow-lg";
        document.getElementById("onlineBadge").innerHTML = `<span class="w-2 h-2 rounded-full bg-current"></span> ESP OFFLINE`;
        document.getElementById("sysStatusText").className = "text-5xl font-black text-error";
        document.getElementById("sysStatusText").innerText = "⛔ ESP UNREACHABLE";
        return;
      }
      
      // Online trigger
      document.getElementById("onlineBadge").className = "badge badge-success badge-lg gap-2 font-bold shadow-lg shadow-success/30";
      document.getElementById("onlineBadge").innerHTML = `<span class="w-2 h-2 rounded-full bg-current"></span> ESP ONLINE`;

      // Assign Data
      document.getElementById("temp").innerText = isNaN(data.temp) ? "Err" : data.temp.toFixed(1);
      document.getElementById("hum").innerText = isNaN(data.hum) ? "Err" : data.hum.toFixed(0);
      document.getElementById("wifiSSID").innerText = data.wifi_ssid || "N/A";
      document.getElementById("wifiRSSI").innerText = data.wifi_rssi !== undefined ? data.wifi_rssi : "--";
      document.getElementById("wifiIP").innerText = data.wifi_ip || "--";

      // Radars
      const updateRadar = (id, state) => {
        const el = document.getElementById(id);
        if(state == 1 || state === true) {
          el.innerText = "MOTION";
          el.className = "badge badge-error badge-lg font-bold animate-pulse shadow-lg shadow-error/50";
        } else {
          el.innerText = "CLEAR";
          el.className = "badge badge-success badge-lg font-bold";
        }
      };
      updateRadar("rdr1", data.rdr1);
      updateRadar("rdr2", data.rdr2);

      // System Status
      const statCard = document.getElementById("statusCard");
      const statText = document.getElementById("sysStatusText");
      
      let cause = "No Motion";
      if (data.rdr1 == 1 && data.rdr2 == 1) cause = "Both Radars";
      else if (data.rdr1 == 1) cause = "Radar 1 Target";
      else if (data.rdr2 == 1) cause = "Radar 2 Target";

      if (data.state === 2) {
          statCard.className = "card bg-error/10 shadow-[0_0_40px_rgba(239,68,68,0.3)] border border-error/50 transition-all duration-300 pulse-danger";
          statText.className = "text-5xl font-black text-error drop-shadow-lg";
          statText.innerText = "🚨 ALARM: " + cause;
      } else if (data.state === 1) {
          statCard.className = "card bg-warning/10 shadow-[0_0_40px_rgba(245,158,11,0.2)] border border-warning/50 transition-all duration-300";
          statText.className = "text-5xl font-black text-warning drop-shadow-md";
          statText.innerText = "⚠️ WARNING: " + cause;
      } else {
          statCard.className = "card bg-base-100 shadow-2xl border border-white/10 transition-all duration-300";
          statText.className = "text-5xl font-black text-success tracking-wider uppercase";
          statText.innerText = "✅ SYSTEM SAFE";
      }
    });

    // Setup Admin Panel
    socket.on('initNumbers', (nums) => {
        document.getElementById('num1_display').innerText = nums[0] || "None";
        document.getElementById('num2_display').innerText = nums[1] || "None";
        document.getElementById('num1_input').value = nums[0] || "";
        document.getElementById('num2_input').value = nums[1] || "";
    });

    // Save Numbers
    function saveNumbers() {
        const n1 = document.getElementById('num1_input').value.trim();
        const n2 = document.getElementById('num2_input').value.trim();
        const validNumbers = [];
        if(n1) validNumbers.push(n1);
        if(n2) validNumbers.push(n2);
        
        socket.emit('updateNumbers', validNumbers);
        document.getElementById('settings_modal').close();
    }

    // Reboot Action
    function rebootESP() {
        if(confirm("CRITICAL: Force reboot remote ESP32 device? Network will drop momentarily.")) {
            socket.emit('rebootESP');
            document.getElementById("sysStatusText").className = "text-5xl font-black text-warning animate-spin-slow";
            document.getElementById("sysStatusText").innerText = "🔄 REBOOTING...";
        }
    }
  </script>
</body>
</html>
